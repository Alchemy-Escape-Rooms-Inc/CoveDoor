; PlatformIO Project Configuration File
;
; Cove Sliding Door Controller
; ESP32-DevKitC + BTS7960 Dual H-Bridge Motor Driver

[env:esp32]
; Pinned to 6.9.0 — last release using Arduino core 2.x, which keeps the
; legacy ledcSetup()/ledcAttachPin() API. See QUIRK:LEDC_API_VERSION in
; MANIFEST.h. Do not bump without migrating PWM calls in main.cpp.
platform = espressif32@6.9.0
board = esp32dev
framework = arduino

; MANIFEST.h uses C++17 inline constexpr — override the Arduino default gnu++11
build_unflags = -std=gnu++11
build_flags = -std=gnu++17

monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient@^2.8

upload_speed = 921600
